<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-collection-play me-2"></i> Film Library
            </a>
            
            <form class="d-none d-md-flex mx-auto w-50">
                <input class="form-control" type="search" placeholder="Search..." aria-label="Search">
            </form>

            <div class="navbar-nav">
                <a class="nav-link active" href="#"><i class="bi bi-person-circle fs-5"></i></a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row min-vh-100">
            
            <aside class="col-md-3 col-lg-2 bg-light d-none d-md-block pt-4">
                <h6 class="text-muted mb-3 px-3">Filters</h6>
                <div class="nav flex-column nav-pills">
                    <a class="nav-link active" href="#">All</a>
                    <a class="nav-link text-dark" href="#">Favorites</a>
                    <a class="nav-link text-dark" href="#">Best Rated</a>
                    <a class="nav-link text-dark" href="#">Seen Last Month</a>
                    <a class="nav-link text-dark" href="#">Unseen</a>
                </div>
            </aside>

            <main class="col-md-9 col-lg-10 pt-4">
                <h1 class="mb-4">All films</h1>

                <ul class="list-group list-group-flush">
                    
                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart-fill text-danger me-3"></i>
                                <span>Pulp fiction</span>
                            </div>
                            <div class="col-4 text-center text-muted">
                                March 10, 2026
                            </div>
                            <div class="col-4 text-end">
                                <span class="me-4 text-warning">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star"></i>
                                </span>
                                <a href="#" class="text-muted me-2"><i class="bi bi-pencil"></i></a>
                                <a href="#" class="text-muted"><i class="bi bi-trash"></i></a>
                            </div>
                        </div>
                    </li>

                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart me-3 text-secondary"></i>
                                <span>21 Grams</span>
                            </div>
                            <div class="col-4 text-center text-muted">
                                March 17, 2026
                            </div>
                            <div class="col-4 text-end">
                                <span class="me-4 text-warning">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                </span>
                                <a href="#" class="text-muted me-2"><i class="bi bi-pencil"></i></a>
                                <a href="#" class="text-muted"><i class="bi bi-trash"></i></a>
                            </div>
                        </div>
                    </li>

                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart me-3 text-secondary"></i>
                                <span>Star Wars</span>
                            </div>
                            <div class="col-4 text-center text-muted">
                                
                            </div>
                            <div class="col-4 text-end">
                                <span class="me-4 text-warning">
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                    <i class="bi bi-star"></i>
                                </span>
                                <a href="#" class="text-muted me-2"><i class="bi bi-pencil"></i></a>
                                <a href="#" class="text-muted"><i class="bi bi-trash"></i></a>
                            </div>
                        </div>
                    </li>
                    
                    <li class="list-group-item py-3">
                        <div class="row align-items-center">
                            <div class="col-4 d-flex align-items-center">
                                <i class="bi bi-heart-fill text-danger me-3"></i>
                                <span>Shrek 2</span>
                            </div>
                            <div class="col-4 text-center text-muted">
                                March 21, 2026
                            </div>
                            <div class="col-4 text-end">
                                <span class="me-4 text-warning">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                </span>
                                <a href="#" class="text-muted me-2"><i class="bi bi-pencil"></i></a>
                                <a href="#" class="text-muted"><i class="bi bi-trash"></i></a>
                            </div>
                        </div>
                    </li>

                </ul>
            </main>
        </div>
    </div>

    <button class="btn btn-primary rounded-circle btn-add d-flex justify-content-center align-items-center">
        <i class="bi bi-plus fs-3"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
